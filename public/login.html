<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ANNIMVERSE</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/toast.css" />

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --primary-glow: #8b5cf6;
        --bg-dark: #050505;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg-dark);
        color: #e0e0e0;
        overflow: hidden;
        /* Mencegah scroll saat hanya 1 halaman penuh */
      }

      /* Input Styles */
      .input-group {
        position: relative;
        transition: all 0.3s ease;
      }

      .input-field {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        transition: all 0.3s ease;
      }

      .input-field:focus {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--primary-glow);
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        outline: none;
      }

      /* Button Glow */
      .btn-glow {
        background: linear-gradient(90deg, #7c3aed, #2563eb);
        transition: 0.3s;
      }

      .btn-glow:hover {
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
        transform: translateY(-2px);
      }

      /* Background Animation */
      .blob {
        position: absolute;
        filter: blur(80px);
        opacity: 0.4;
        animation: float 10s infinite ease-in-out;
        z-index: -1;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0);
        }

        50% {
          transform: translate(20px, -20px);
        }
      }
    </style>
  </head>

  <body class="flex items-center justify-center min-h-screen relative">
    <!-- Ambient Background Blobs -->
    <div
      class="blob bg-violet-600 w-96 h-96 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"
    ></div>
    <div
      class="blob bg-cyan-600 w-80 h-80 rounded-full bottom-0 right-0 translate-x-1/3 translate-y-1/3 animation-delay-2000"
    ></div>

    <!-- Login Card -->
    <div
      class="w-full max-w-md px-6 py-8 md:px-8 bg-[#0f0f11]/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl relative z-10 mx-4"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <a
          href="index.html"
          class="inline-flex items-center gap-2 mb-4 hover:scale-105 transition"
        >
          <i data-lucide="play-circle" class="text-violet-500 w-8 h-8"></i>
          <span class="font-bold text-2xl tracking-wider text-white"
            >ANNIM<span class="text-violet-500">VERSE</span></span
          >
        </a>
        <h2 class="text-2xl font-bold text-white">Welcome Back!</h2>
        <p class="text-gray-400 text-sm mt-1">
          Lanjutkan watching streak kamu hari ini.
        </p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-6" action="#" method="POST">
        <!-- Email -->
        <div class="space-y-1">
          <label for="email" class="text-sm font-medium text-gray-300 ml-1"
            >Email Address</label
          >
          <div class="relative input-group">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i data-lucide="mail" class="h-5 w-5 text-gray-500"></i>
            </div>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm placeholder-gray-600"
              placeholder="nama@email.com"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1">
          <div class="flex justify-between items-center ml-1">
            <label for="password" class="text-sm font-medium text-gray-300"
              >Password</label
            >
            <a
              href="forgot-password.html"
              class="text-xs text-violet-400 hover:text-violet-300 transition"
              >Lupa Password?</a
            >
          </div>
          <div class="relative input-group">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i data-lucide="lock" class="h-5 w-5 text-gray-500"></i>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="input-field w-full pl-10 pr-10 py-3 rounded-lg text-sm placeholder-gray-600"
              placeholder="••••••••"
            />
            <!-- Toggle Password Visibility -->
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-white transition"
            >
              <i id="eye-icon" data-lucide="eye" class="h-5 w-5"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn-glow w-full text-white font-bold py-3 rounded-lg shadow-lg flex justify-center items-center gap-2 group"
        >
          <span>Masuk Sekarang</span>
          <i
            data-lucide="arrow-right"
            class="w-4 h-4 group-hover:translate-x-1 transition"
          ></i>
        </button>
      </form>

      <!-- Footer / Register Link -->
      <div class="mt-8 text-center border-t border-white/10 pt-6">
        <p class="text-gray-400 text-sm">
          Belum punya akun?
          <a
            href="register.html"
            class="text-violet-400 font-semibold hover:text-violet-300 hover:underline transition"
            >Daftar Gratis</a
          >
        </p>
      </div>
    </div>

    <script>
      lucide.createIcons();

      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eye-icon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.setAttribute("data-lucide", "eye-off"); // Ganti icon manual atau re-render lucide jika perlu
          // Karena lucide merender SVG, cara termudah mengganti icon statis:
          eyeIcon.innerHTML =
            '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
        } else {
          passwordInput.type = "password";
          eyeIcon.innerHTML =
            '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
        }
      }
    </script>
    <script src="js/auth.js"></script>
  </body>
</html>
