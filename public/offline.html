<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - ANNIMVERSE</title>
    <link rel="stylesheet" href="/css/tailwind.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", sans-serif;
        background: linear-gradient(135deg, #050505 0%, #1a1a1d 100%);
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-md">
      <!-- Icon -->
      <div class="mb-6">
        <svg
          class="w-24 h-24 mx-auto text-violet-500"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"
          />
        </svg>
      </div>

      <!-- Title -->
      <h1 class="text-3xl font-bold text-white mb-3">You're Offline</h1>

      <!-- Message -->
      <p class="text-gray-400 mb-6">
        It looks like you've lost your internet connection. Check your network
        settings and try again.
      </p>

      <!-- Status -->
      <div
        id="connection-status"
        class="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-4 mb-6"
      >
        <p class="text-yellow-500 text-sm font-medium">
          ⚠️ No internet connection detected
        </p>
      </div>

      <!-- Retry Button -->
      <button
        onclick="window.location.reload()"
        class="bg-violet-600 hover:bg-violet-700 text-white font-bold px-8 py-3 rounded-xl transition inline-flex items-center gap-2"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          />
        </svg>
        Try Again
      </button>

      <!-- Go Back -->
      <div class="mt-4">
        <button
          onclick="window.history.back()"
          class="text-gray-400 hover:text-white transition text-sm"
        >
          ← Go Back
        </button>
      </div>
    </div>

    <script>
      // Auto-detect when connection is restored
      window.addEventListener("online", () => {
        const status = document.getElementById("connection-status");
        status.className =
          "bg-green-500/10 border border-green-500/30 rounded-xl p-4 mb-6";
        status.innerHTML =
          '<p class="text-green-500 text-sm font-medium">✅ Connection restored! Redirecting...</p>';

        setTimeout(() => {
          window.location.reload();
        }, 1000);
      });
    </script>
  </body>
</html>
