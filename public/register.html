<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - ANNIMVERSE</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/toast.css" />

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --primary-glow: #06b6d4; /* Cyan untuk Register agar beda dikit */
        --bg-dark: #050505;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg-dark);
        color: #e0e0e0;
        overflow-y: auto; /* Allow scroll on small screens */
      }

      .input-field {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        transition: all 0.3s ease;
      }

      .input-field:focus {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--primary-glow);
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); /* Cyan Shadow */
        outline: none;
      }

      .btn-glow {
        background: linear-gradient(90deg, #06b6d4, #3b82f6);
        transition: 0.3s;
      }

      .btn-glow:hover {
        box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
        transform: translateY(-2px);
      }

      /* Checkbox Custom Style */
      .custom-checkbox {
        appearance: none;
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        width: 1.25rem;
        height: 1.25rem;
        border-radius: 0.25rem;
        display: inline-grid;
        place-content: center;
        cursor: pointer;
      }
      .custom-checkbox::before {
        content: "";
        width: 0.75rem;
        height: 0.75rem;
        transform: scale(0);
        transition: 120ms transform ease-in-out;
        box-shadow: inset 1em 1em var(--primary-glow);
        transform-origin: center;
        clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
      }
      .custom-checkbox:checked::before {
        transform: scale(1);
      }

      /* Background Animation */
      .blob {
        position: absolute;
        filter: blur(90px);
        opacity: 0.3;
        z-index: -1;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen relative py-10">
    <!-- Ambient Background Blobs -->
    <div
      class="blob bg-cyan-600 w-96 h-96 rounded-full bottom-0 left-0 -translate-x-1/4 translate-y-1/4 fixed"
    ></div>
    <div
      class="blob bg-violet-600 w-80 h-80 rounded-full top-0 right-0 translate-x-1/4 -translate-y-1/4 fixed"
    ></div>

    <!-- Register Card -->
    <div
      class="w-full max-w-md px-6 py-8 md:px-8 bg-[#0f0f11]/90 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl relative z-10 mx-4"
    >
      <!-- Header -->
      <div class="text-center mb-6">
        <a
          href="index.html"
          class="inline-flex items-center gap-2 mb-2 hover:opacity-80 transition"
        >
          <i data-lucide="play-circle" class="text-cyan-400 w-8 h-8"></i>
          <span class="font-bold text-2xl tracking-wider text-white"
            >ANNIM<span class="text-violet-500">VERSE</span></span
          >
        </a>
        <h2 class="text-2xl font-bold text-white">Join the Universe</h2>
        <p class="text-gray-400 text-sm mt-1">
          Buat akun untuk akses full library dan gamifikasi.
        </p>
      </div>

      <!-- Form -->
      <form id="registerForm" class="space-y-4" action="#" method="POST">
        <!-- Username -->
        <div>
          <label for="username" class="text-sm font-medium text-gray-300 ml-1"
            >Username</label
          >
          <div class="relative mt-1">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i data-lucide="user" class="h-5 w-5 text-gray-500"></i>
            </div>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm placeholder-gray-600"
              placeholder="wibusejati123"
            />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="text-sm font-medium text-gray-300 ml-1"
            >Email</label
          >
          <div class="relative mt-1">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i data-lucide="mail" class="h-5 w-5 text-gray-500"></i>
            </div>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm placeholder-gray-600"
              placeholder="nama@email.com"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="text-sm font-medium text-gray-300 ml-1"
            >Password</label
          >
          <div class="relative mt-1">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i data-lucide="lock" class="h-5 w-5 text-gray-500"></i>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm placeholder-gray-600"
              placeholder="Minimal 8 karakter"
            />
          </div>
        </div>

        <!-- Terms Checkbox -->
        <div class="flex items-start gap-3 mt-2">
          <input
            type="checkbox"
            id="terms"
            class="custom-checkbox mt-1 shrink-0"
            required
          />
          <label for="terms" class="text-xs text-gray-400">
            Saya setuju dengan
            <a href="#" class="text-cyan-400 hover:underline"
              >Syarat dan Ketentuan</a
            >
            serta
            <a href="#" class="text-cyan-400 hover:underline"
              >Kebijakan Privasi</a
            >
            Annimverse.
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn-glow w-full text-white font-bold py-3 rounded-lg shadow-lg flex justify-center items-center gap-2 mt-4"
        >
          Buat Akun Baru
        </button>
      </form>

      <!-- Footer / Login Link -->
      <div class="mt-6 text-center border-t border-white/10 pt-4">
        <p class="text-gray-400 text-sm">
          Sudah punya akun?
          <a
            href="login.html"
            class="text-cyan-400 font-semibold hover:text-cyan-300 hover:underline transition"
            >Login disini</a
          >
        </p>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>
    <script src="js/auth.js"></script>
  </body>
</html>
