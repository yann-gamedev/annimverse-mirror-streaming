<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Service Worker - ANNIMVERSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gray-800 rounded-lg p-8 text-center">
        <h1 class="text-2xl font-bold mb-4">🔄 Service Worker Reset</h1>
        <p class="text-gray-400 mb-6">Click the button below to unregister all service workers and clear cache.</p>

        <button onclick="resetServiceWorker()"
            class="bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 px-6 rounded-lg mb-4 w-full">
            Reset Service Worker
        </button>

        <div id="status" class="text-sm text-gray-500"></div>
    </div>

    <script>
        async function resetServiceWorker() {
            const statusEl = document.getElementById('status');

            try {
                statusEl.innerHTML = '🔄 Unregistering service workers...';

                // Unregister all service workers
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }

                statusEl.innerHTML = '🗑️ Clearing caches...';

                // Clear all caches
                const cacheNames = await caches.keys();
                for (let cacheName of cacheNames) {
                    await caches.delete(cacheName);
                }

                statusEl.innerHTML = '✅ Success! Reloading page...';
                statusEl.className = 'text-sm text-green-500 font-bold';

                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);

            } catch (error) {
                statusEl.innerHTML = `❌ Error: ${error.message}`;
                statusEl.className = 'text-sm text-red-500';
            }
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            const auto = new URLSearchParams(window.location.search).get('auto');
            if (auto === 'true') {
                resetServiceWorker();
            }
        });
    </script>
</body>

</html>
