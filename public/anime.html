<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jelajahi Anime - ANNIMVERSE</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/guard.js"></script>

    <style>
      :root {
        --primary-glow: #8b5cf6;
        --bg-dark: #050505;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg-dark);
        color: #e0e0e0;
      }

      /* Hide Scrollbar */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Filter Styles */
      .status-btn {
        flex: 1;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.875rem;
        transition: all 0.2s;
        cursor: pointer;
      }

      .status-btn:hover {
        background: rgba(139, 92, 246, 0.1);
        border-color: rgba(139, 92, 246, 0.3);
      }

      .status-btn.active {
        background: rgba(139, 92, 246, 0.2);
        border-color: rgba(139, 92, 246, 0.5);
        color: #a78bfa;
        font-weight: 600;
      }

      .genre-chip-selected {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.75rem;
        border-radius: 9999px;
        background: rgba(139, 92, 246, 0.2);
        border: 1px solid rgba(139, 92, 246, 0.5);
        color: #a78bfa;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .genre-chip-selected button {
        color: #a78bfa;
        transition: color 0.2s;
      }

      .genre-chip-selected button:hover {
        color: #ef4444;
      }

      .recent-search-chip {
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .recent-search-chip:hover {
        background: rgba(139, 92, 246, 0.1);
        border-color: rgba(139, 92, 246, 0.3);
        color: #a78bfa;
      }
    </style>
  </head>

  <body class="pb-24">
    <header
      class="sticky top-0 z-40 bg-[#050505]/95 backdrop-blur-md border-b border-white/5 pb-2"
    >
      <div class="max-w-7xl mx-auto px-4 pt-4">
        <!-- Top Bar -->
        <div class="flex items-center justify-between mb-4">
          <h1 class="text-xl font-bold text-white">Jelajahi</h1>
          <a href="menu.html" class="text-gray-400 hover:text-white"
            ><i data-lucide="home" class="w-6 h-6"></i
          ></a>
        </div>
      </div>
    </header>

    <!-- 🔍 Advanced Search & Filters -->
    <section class="max-w-7xl mx-auto mb-6 px-4 pt-4">
      <!-- Search Bar -->
      <div class="mb-4">
        <div class="relative">
          <i
            data-lucide="search"
            class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-500"
          ></i>
          <input
            type="text"
            id="search-input"
            placeholder="Cari judul anime..."
            class="w-full bg-[#0f0f11] border border-white/10 rounded-xl pl-12 pr-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-violet-500 transition"
          />
        </div>

        <!-- Recent Searches -->
        <div id="recent-searches" class="mt-2 flex flex-wrap gap-2"></div>
      </div>

      <!-- Filter Toggle (Mobile) -->
      <button
        id="filter-toggle"
        class="md:hidden w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white flex items-center justify-between mb-4"
      >
        <span class="flex items-center gap-2">
          <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
          Filter & Urut
        </span>
        <i data-lucide="chevron-down" class="w-5 h-5"></i>
      </button>

      <!-- Filter Panel -->
      <div
        id="filter-panel"
        class="md:block bg-[#0f0f11] border border-white/10 rounded-xl p-4 space-y-4"
      >
        <!-- Row 1: Genre & Sort -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Genre Multi-Select -->
          <div>
            <label
              class="text-xs text-gray-400 uppercase tracking-wider mb-2 block"
              >Genre</label
            >
            <div
              id="selected-genres"
              class="flex flex-wrap gap-2 mb-2 min-h-[32px]"
            ></div>
            <select
              id="genre-select"
              class="w-full bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-white text-sm"
            >
              <option value="">+ Pilih Genre</option>
              <option value="Action">Action</option>
              <option value="Adventure">Adventure</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Horror">Horror</option>
              <option value="Mystery">Mystery</option>
              <option value="Romance">Romance</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Slice of Life">Slice of Life</option>
              <option value="Sports">Sports</option>
              <option value="Supernatural">Supernatural</option>
            </select>
          </div>

          <!-- Sort -->
          <div>
            <label
              class="text-xs text-gray-400 uppercase tracking-wider mb-2 block"
              >Urut Berdasarkan</label
            >
            <select
              id="sort-select"
              class="w-full bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-white text-sm h-[42px]"
            >
              <option value="latest">🆕 Terbaru Ditambahkan</option>
              <option value="rating">⭐ Rating Tertinggi</option>
              <option value="title-asc">🔤 Judul (A-Z)</option>
              <option value="title-desc">🔤 Judul (Z-A)</option>
              <option value="year-desc">📅 Tahun (Terbaru)</option>
              <option value="year-asc">📅 Tahun (Terlama)</option>
            </select>
          </div>
        </div>

        <!-- Row 2: Status & Year Range -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Status Filter -->
          <div>
            <label
              class="text-xs text-gray-400 uppercase tracking-wider mb-2 block"
              >Status</label
            >
            <div class="flex gap-2">
              <button class="status-btn active" data-status="All">Semua</button>
              <button class="status-btn" data-status="Ongoing">Ongoing</button>
              <button class="status-btn" data-status="Completed">
                Completed
              </button>
            </div>
          </div>

          <!-- Year Range -->
          <div>
            <label
              class="text-xs text-gray-400 uppercase tracking-wider mb-2 block"
              >Tahun Rilis</label
            >
            <div class="flex gap-2 items-center">
              <input
                type="number"
                id="year-from"
                min="1990"
                max="2026"
                placeholder="Dari"
                class="flex-1 bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-white text-sm"
              />
              <span class="text-gray-500">-</span>
              <input
                type="number"
                id="year-to"
                min="1990"
                max="2026"
                placeholder="Sampai"
                class="flex-1 bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-white text-sm"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Anime Grid -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      <!-- Status Info -->
      <div id="result-info" class="mb-4 text-sm text-gray-400"></div>

      <div
        id="anime-grid"
        class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"
      >
        <!-- Loading Skeleton -->
        <div class="animate-pulse bg-gray-800 rounded-xl aspect-[2/3]"></div>
        <div class="animate-pulse bg-gray-800 rounded-xl aspect-[2/3]"></div>
        <div class="animate-pulse bg-gray-800 rounded-xl aspect-[2/3]"></div>
        <div class="animate-pulse bg-gray-800 rounded-xl aspect-[2/3]"></div>
      </div>

      <!-- Load More Button -->
      <div id="load-more-container" class="hidden text-center mt-8">
        <button
          id="load-more-btn"
          class="bg-violet-600 hover:bg-violet-700 text-white font-bold px-8 py-3 rounded-xl transition flex items-center gap-2 mx-auto"
        >
          <i data-lucide="chevron-down" class="w-5 h-5"></i>
          Muat Lebih Banyak
        </button>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-10">
        <i data-lucide="ghost" class="w-12 h-12 text-gray-600 mx-auto mb-3"></i>
        <p class="text-gray-500 text-sm">Tidak ada anime ditemukan.</p>
      </div>
    </main>

    <!-- Bottom Nav -->
    <div
      class="fixed bottom-0 w-full bg-[#050505]/90 backdrop-blur-lg border-t border-white/10 z-50"
    >
      <div class="flex justify-around items-center py-3">
        <a
          href="menu.html"
          class="flex flex-col items-center gap-1 text-gray-500 hover:text-violet-400"
        >
          <i data-lucide="layout-grid" class="w-5 h-5"></i>
          <span class="text-[10px]">Dashboard</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-violet-500">
          <i data-lucide="compass" class="w-5 h-5"></i>
          <span class="text-[10px] font-bold">Explore</span>
        </a>
        <a
          href="profile.html"
          class="flex flex-col items-center gap-1 text-gray-500 hover:text-violet-400"
        >
          <i data-lucide="user" class="w-5 h-5"></i>
          <span class="text-[10px]">Profile</span>
        </a>
      </div>
    </div>

    <script>
      lucide.createIcons();

      // State
      let currentPage = 1;
      let currentFilters = {
        genres: [],
        sort: "latest",
        status: "All",
        yearFrom: null,
        yearTo: null,
        q: "",
      };
      let hasMore = false;

      // Initialize
      loadRecentSearches();
      loadAnime();

      // Event Listeners
      document.getElementById("search-input").addEventListener(
        "input",
        debounce((e) => {
          currentFilters.q = e.target.value.trim();
          if (currentFilters.q) {
            saveRecentSearch(currentFilters.q);
          }
          resetAndLoad();
        }, 500),
      );

      document
        .getElementById("genre-select")
        .addEventListener("change", (e) => {
          if (
            e.target.value &&
            !currentFilters.genres.includes(e.target.value)
          ) {
            currentFilters.genres.push(e.target.value);
            renderSelectedGenres();
            resetAndLoad();
          }
          e.target.value = "";
        });

      document.getElementById("sort-select").addEventListener("change", (e) => {
        currentFilters.sort = e.target.value;
        resetAndLoad();
      });

      document.querySelectorAll(".status-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".status-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilters.status = btn.dataset.status;
          resetAndLoad();
        });
      });

      document.getElementById("year-from").addEventListener("change", (e) => {
        currentFilters.yearFrom = e.target.value || null;
        resetAndLoad();
      });

      document.getElementById("year-to").addEventListener("change", (e) => {
        currentFilters.yearTo = e.target.value || null;
        resetAndLoad();
      });

      document.getElementById("load-more-btn").addEventListener("click", () => {
        currentPage++;
        loadAnime(false); // Don't reset grid
      });

      // Mobile filter toggle
      document.getElementById("filter-toggle").addEventListener("click", () => {
        const panel = document.getElementById("filter-panel");
        panel.classList.toggle("hidden");
      });

      // Functions
      function resetAndLoad() {
        currentPage = 1;
        loadAnime(true);
      }

      async function loadAnime(resetGrid = true) {
        try {
          const params = new URLSearchParams();
          if (currentFilters.q) params.append("q", currentFilters.q);
          if (currentFilters.genres.length > 0)
            params.append("genres", currentFilters.genres.join(","));
          params.append("sort", currentFilters.sort);
          if (currentFilters.status !== "All")
            params.append("status", currentFilters.status);
          if (currentFilters.yearFrom)
            params.append("yearFrom", currentFilters.yearFrom);
          if (currentFilters.yearTo)
            params.append("yearTo", currentFilters.yearTo);
          params.append("page", currentPage);
          params.append("limit", 20);

          const response = await fetch(`/api/anime?${params}`);
          const data = await response.json();

          const container = document.getElementById("anime-grid");

          if (resetGrid) {
            container.innerHTML = "";
          }

          if (data.animes && data.animes.length > 0) {
            data.animes.forEach((anime) => {
              container.innerHTML += renderAnimeCard(anime);
            });

            document.getElementById("empty-state").classList.add("hidden");

            // Update pagination
            hasMore = data.pagination.hasMore;
            document
              .getElementById("load-more-container")
              .classList.toggle("hidden", !hasMore);

            // Update info
            document.getElementById("result-info").innerHTML = `
                        Menampilkan ${data.animes.length} dari ${data.pagination.totalAnimes} anime
                    `;
          } else if (resetGrid) {
            container.innerHTML = "";
            document.getElementById("empty-state").classList.remove("hidden");
            document
              .getElementById("load-more-container")
              .classList.add("hidden");
            document.getElementById("result-info").innerHTML = "";
          }

          lucide.createIcons();
        } catch (error) {
          console.error("Failed to load anime:", error);
        }
      }

      function renderAnimeCard(anime) {
        return `
                <a href="detail.html?slug=${anime.slug}" class="group relative rounded-xl overflow-hidden aspect-[2/3] bg-gray-900 border border-white/5 hover:border-violet-500/50 transition">
                    <img src="${anime.posterUrl}" alt="${anime.title}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110" loading="lazy">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-3">
                        <h3 class="text-white text-sm font-bold truncate group-hover:text-violet-400 transition">${anime.title}</h3>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[10px] text-gray-400">${anime.releaseYear || "-"}</span>
                            <span class="text-[10px] text-yellow-500 font-bold flex items-center gap-0.5">
                                <i data-lucide="star" class="w-3 h-3 fill-current"></i> ${anime.rating || "N/A"}
                            </span>
                        </div>
                    </div>
                </a>
            `;
      }

      function renderSelectedGenres() {
        const container = document.getElementById("selected-genres");
        container.innerHTML = "";
        currentFilters.genres.forEach((genre) => {
          container.innerHTML += `
                    <div class="genre-chip-selected">
                        ${genre}
                        <button onclick="removeGenre('${genre}')">×</button>
                    </div>
                `;
        });
      }

      function removeGenre(genre) {
        currentFilters.genres = currentFilters.genres.filter(
          (g) => g !== genre,
        );
        renderSelectedGenres();
        resetAndLoad();
      }

      function loadRecentSearches() {
        const recent = JSON.parse(
          localStorage.getItem("recentSearches") || "[]",
        );
        const container = document.getElementById("recent-searches");
        container.innerHTML = "";
        recent.slice(0, 5).forEach((search) => {
          container.innerHTML += `
                    <span class="recent-search-chip" onclick="applyRecentSearch('${search}')">${search}</span>
                `;
        });
      }

      function saveRecentSearch(query) {
        if (!query || query.length < 2) return;
        let recent = JSON.parse(localStorage.getItem("recentSearches") || "[]");
        recent = recent.filter((s) => s !== query);
        recent.unshift(query);
        localStorage.setItem(
          "recentSearches",
          JSON.stringify(recent.slice(0, 10)),
        );
        loadRecentSearches();
      }

      function applyRecentSearch(query) {
        document.getElementById("search-input").value = query;
        currentFilters.q = query;
        resetAndLoad();
      }

      function debounce(func, wait) {
        let timeout;
        return function (...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), wait);
        };
      }
    </script>
  </body>
</html>
