<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ANNIMVERSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #050505 0%, #1a0a2e 100%);
            color: #e0e0e0;
        }

        .glass-card {
            background: rgba(15, 15, 17, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #2563eb);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            outline: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Back Button -->
        <div class="mb-6">
            <a href="login.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Login
            </a>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-2xl p-8 shadow-2xl">
            <!-- Logo -->
            <div class="flex items-center justify-center gap-2 mb-6">
                <i data-lucide="play-circle" class="text-violet-500 w-10 h-10"></i>
                <span class="font-bold text-2xl tracking-wider text-white">
                    ANNIM<span class="text-violet-500">VERSE</span>
                </span>
            </div>

            <!-- Title -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white mb-2">Forgot Password?</h1>
                <p class="text-sm text-gray-400">Enter your email to receive a reset code</p>
            </div>

            <!-- Step 1: Enter Email -->
            <div id="step1">
                <form id="forgot-form" class="space-y-4">
                    <div>
                        <label class="text-sm text-gray-400 mb-2 block">Email Address</label>
                        <input type="email" id="email" required
                            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                            placeholder="your@email.com">
                    </div>

                    <button type="submit"
                        class="btn-primary w-full py-3 rounded-lg text-white font-bold flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-5 h-5"></i>
                        <span>Send Reset Code</span>
                    </button>
                </form>
            </div>

            <!-- Step 2: Success Message (Hidden initially) -->
            <div id="step2" class="hidden">
                <div class="bg-green-500/10 border border-green-500/30 rounded-lg p-4 mb-6">
                    <div class="flex items-start gap-3">
                        <i data-lucide="check-circle" class="w-5 h-5 text-green-500 flex-shrink-0 mt-0.5"></i>
                        <div>
                            <p class="text-green-400 font-semibold">Code Sent!</p>
                            <p class="text-sm text-gray-400 mt-1">
                                We've sent a 6-digit reset code to <strong id="sent-email"></strong>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <p class="text-sm text-gray-400 mb-4">Check your email for the code</p>
                    <a href="reset-password.html"
                        class="btn-primary inline-block w-full py-3 rounded-lg text-white font-bold text-center">
                        Enter Code & Reset Password
                    </a>

                    <button onclick="goBack()" class="mt-4 text-sm text-gray-500 hover:text-white transition">
                        Send to different email
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading" class="hidden text-center py-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-violet-500 mx-auto"></div>
                <p class="text-gray-400 mt-3 text-sm">Sending code...</p>
            </div>

        </div>

        <!-- Info -->
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-500">
                Code expires in 15 minutes • Check spam folder if not received
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const forgotForm = document.getElementById('forgot-form');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const loading = document.getElementById('loading');
        const emailInput = document.getElementById('email');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                alert('Please enter your email');
                return;
            }

            // Show loading
            step1.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                // Hide loading
                loading.classList.add('hidden');

                if (res.ok) {
                    // Show success step
                    document.getElementById('sent-email').textContent = email;
                    step2.classList.remove('hidden');

                    // Store email for next page
                    sessionStorage.setItem('resetEmail', email);

                    lucide.createIcons();
                } else {
                    // Show error but don't reveal if email exists
                    alert(data.message || 'Failed to send reset code');
                    step1.classList.remove('hidden');
                }
            } catch (error) {
                loading.classList.add('hidden');
                step1.classList.remove('hidden');
                alert('Failed to connect to server');
                console.error(error);
            }
        });

        function goBack() {
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            emailInput.value = '';
        }
    </script>
</body>

</html>
