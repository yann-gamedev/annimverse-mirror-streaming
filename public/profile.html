<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya - ANNIMVERSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/guard.js"></script>

    <style>
      :root {
        --primary-glow: #8b5cf6;
        --bg-dark: #050505;
      }
      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg-dark);
        color: #e0e0e0;
      }
      .profile-header {
        background: linear-gradient(
          180deg,
          rgba(139, 92, 246, 0.15) 0%,
          rgba(5, 5, 5, 0) 100%
        );
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .menu-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.2s;
      }
      .menu-item:active {
        transform: scale(0.98);
        background: rgba(139, 92, 246, 0.1);
      }
      .history-card {
        background: #121214;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.2s;
      }
    </style>
  </head>
  <body class="pb-24">
    <nav
      class="flex justify-between items-center px-6 py-5 sticky top-0 z-50 bg-[#050505]/90 backdrop-blur-md"
    >
      <h1 class="text-xl font-bold text-white">Profil Saya</h1>
      <button
        type="button"
        onclick="logout()"
        class="text-red-400 hover:text-red-300 transition"
        aria-label="Logout"
      >
        <i data-lucide="log-out" class="w-6 h-6"></i>
      </button>
    </nav>

    <header class="profile-header px-6 pt-4 pb-8 text-center">
      <div
        class="relative inline-block mb-4 group cursor-pointer"
        onclick="document.getElementById('fileInput').click()"
      >
        <img
          id="p-avatar"
          src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
          alt="Profile"
          class="w-24 h-24 rounded-full border-4 border-[#1a1a1d] shadow-2xl shadow-violet-500/20 object-cover"
        />
        <div
          class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition"
        >
          <i data-lucide="camera" class="w-8 h-8 text-white"></i>
        </div>
        <div
          class="absolute bottom-0 right-0 bg-green-500 border-4 border-[#050505] w-6 h-6 rounded-full"
        ></div>
      </div>
      <input
        type="file"
        id="fileInput"
        class="hidden"
        accept="image/*"
        onchange="handleFileUpload(this)"
      />

      <h2 id="p-username" class="text-2xl font-bold text-white mb-1">...</h2>
      <p id="p-email" class="text-sm text-gray-400 mb-4">...</p>

      <div
        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-400 text-xs font-bold tracking-wider"
      >
        <i data-lucide="crown" class="w-3 h-3"></i>
        <span id="p-level">LEVEL 1</span>
      </div>
    </header>

    <section class="px-6 -mt-6 mb-8">
      <div class="grid grid-cols-3 gap-3">
        <div
          class="bg-[#121214] border border-white/5 p-3 rounded-xl text-center"
        >
          <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">
            XP
          </p>
          <p id="p-xp" class="text-lg font-bold text-white">0</p>
        </div>
        <div
          class="bg-[#121214] border border-white/5 p-3 rounded-xl text-center"
        >
          <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">
            Menit
          </p>
          <p id="p-watchtime" class="text-lg font-bold text-violet-400">0</p>
        </div>
        <div
          class="bg-[#121214] border border-white/5 p-3 rounded-xl text-center"
        >
          <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">
            Streak
          </p>
          <div class="flex items-center justify-center gap-1 text-orange-500">
            <i data-lucide="flame" class="w-4 h-4 fill-current"></i>
            <span id="p-streak" class="text-lg font-bold">0</span>
          </div>
        </div>
      </div>
    </section>

    <section class="px-6 mb-8">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xs font-bold text-gray-500 uppercase pl-1">
          Lanjut Nonton
        </h3>
        <span class="text-[10px] text-violet-400">Terbaru</span>
      </div>
      <div id="history-list" class="space-y-3">
        <div class="h-16 bg-white/5 rounded-xl animate-pulse"></div>
      </div>
    </section>

    <section class="px-6 space-y-3">
      <h3 class="text-xs font-bold text-gray-500 uppercase mb-4 pl-1">
        Menu Lainnya
      </h3>
      <a
        href="achievements.html"
        class="menu-item flex items-center justify-between p-4 rounded-xl group"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-yellow-500/10 flex items-center justify-center text-yellow-500"
          >
            <i data-lucide="trophy" class="w-5 h-5"></i>
          </div>
          <div>
            <h4 class="text-white font-bold text-sm">Hall of Fame</h4>
            <p class="text-[10px] text-gray-400">Piala dan Badge</p>
          </div>
        </div>
        <i
          data-lucide="chevron-right"
          class="w-5 h-5 text-gray-600 group-hover:text-white"
        ></i>
      </a>
      <a
        href="setting.html"
        class="menu-item flex items-center justify-between p-4 rounded-xl group"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-gray-500/10 flex items-center justify-center text-gray-400"
          >
            <i data-lucide="settings" class="w-5 h-5"></i>
          </div>
          <div>
            <h4 class="text-white font-bold text-sm">Pengaturan</h4>
            <p class="text-[10px] text-gray-400">Akun dan Password</p>
          </div>
        </div>
        <i
          data-lucide="chevron-right"
          class="w-5 h-5 text-gray-600 group-hover:text-white"
        ></i>
      </a>
    </section>

    <div class="text-center mt-10 mb-8 text-[10px] text-gray-600">
      <p>Bergabung sejak <span id="p-joined">...</span></p>
    </div>

    <div
      class="fixed bottom-0 w-full bg-[#050505]/90 backdrop-blur-lg border-t border-white/10 z-50"
    >
      <div class="flex justify-around items-center py-3">
        <a
          href="menu.html"
          class="flex flex-col items-center gap-1 text-gray-500 hover:text-violet-400"
          ><i data-lucide="layout-grid" class="w-5 h-5"></i
          ><span class="text-[10px]">Dashboard</span></a
        >
        <a
          href="anime.html"
          class="flex flex-col items-center gap-1 text-gray-500 hover:text-violet-400"
          ><i data-lucide="compass" class="w-5 h-5"></i
          ><span class="text-[10px]">Explore</span></a
        >
        <a href="#" class="flex flex-col items-center gap-1 text-violet-500"
          ><i data-lucide="user" class="w-5 h-5"></i
          ><span class="text-[10px] font-bold">Profile</span></a
        >
      </div>
    </div>

    <script>
      lucide.createIcons();
      const localUser = JSON.parse(localStorage.getItem("user"));
      const token = localStorage.getItem("token");

      async function loadProfile() {
        if (!localUser || !localUser.id) {
          logout();
          return;
        }
        try {
          const response = await fetch(`/api/users/${localUser.id}`);
          const user = await response.json();

          document.getElementById("p-username").innerText = user.username;
          document.getElementById("p-email").innerText = user.email;
          const avatarUrl =
            user.avatar ||
            `https://ui-avatars.com/api/?name=${user.username}&background=random&color=fff`;
          document.getElementById("p-avatar").src =
            `${avatarUrl}?v=${new Date().getTime()}`;

          document.getElementById("p-level").innerText =
            `LEVEL ${user.stats?.level || 1}`;
          document.getElementById("p-xp").innerText = user.stats?.xp || 0;
          document.getElementById("p-watchtime").innerText =
            user.stats?.totalWatchTime || 0;
          document.getElementById("p-streak").innerText =
            user.stats?.currentStreak || 0;
          document.getElementById("p-joined").innerText = new Date(
            user.createdAt,
          ).toLocaleDateString("id-ID", { year: "numeric", month: "long" });

          loadHistory();
        } catch (error) {
          console.error(error);
        }
      }

      async function loadHistory() {
        try {
          const res = await fetch(`/api/interact/history/${localUser.id}`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const history = await res.json();
          const container = document.getElementById("history-list");

          container.innerHTML = "";
          if (history.length === 0) {
            container.innerHTML =
              '<p class="text-center text-xs text-gray-600 py-4">Belum ada riwayat tontonan.</p>';
            return;
          }

          history.slice(0, 3).forEach((h) => {
            const poster = h.anime.posterUrl || "https://placehold.co/100x150";
            container.innerHTML += `
                        <a href="watch.html?slug=${h.anime.slug}&eps=${h.episode.episodeNumber}" class="history-card flex gap-3 p-2 rounded-xl group hover:border-violet-500/50">
                            <img src="${poster}" alt="${h.anime.title}" class="w-16 h-10 object-cover rounded-lg bg-gray-800">
                            <div class="flex-1 min-w-0 flex flex-col justify-center">
                                <h4 class="text-white text-xs font-bold truncate group-hover:text-violet-300">${h.anime.title}</h4>
                                <p class="text-[10px] text-gray-500">Eps ${h.episode.episodeNumber}: ${h.episode.title}</p>
                            </div>
                            <div class="flex items-center pr-2 text-violet-500 opacity-0 group-hover:opacity-100 transition">
                                <i data-lucide="play-circle" class="w-5 h-5"></i>
                            </div>
                        </a>`;
          });
          lucide.createIcons();
        } catch (err) {
          console.error("Gagal load history");
        }
      }

      async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("avatar", file);
        document.getElementById("p-avatar").style.opacity = "0.5";

        try {
          const res = await fetch(`/api/users/${localUser.id}/avatar`, {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (res.ok) {
            alert("Foto berhasil diupdate!");
            localUser.avatar = data.avatarUrl;
            localStorage.setItem("user", JSON.stringify(localUser));
            window.location.reload();
          } else alert("Gagal: " + data.message);
        } catch (err) {
          alert("Error Server");
        }
      }

      loadProfile();
    </script>
  </body>
</html>
