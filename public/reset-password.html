<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ANNIMVERSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #050505 0%, #1a0a2e 100%);
            color: #e0e0e0;
        }

        .glass-card {
            background: rgba(15, 15, 17, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #2563eb);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            outline: none;
        }

        .code-input {
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
            font-family: monospace;
        }

        .pwd-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Back Button -->
        <div class="mb-6">
            <a href="forgot-password.html"
                class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back
            </a>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-2xl p-8 shadow-2xl">
            <!-- Logo -->
            <div class="flex items-center justify-center gap-2 mb-6">
                <i data-lucide="lock" class="text-violet-500 w-10 h-10"></i>
                <span class="font-bold text-2xl tracking-wider text-white">
                    Reset Password
                </span>
            </div>

            <!-- Info -->
            <div class="bg-blue-500/10 border border-blue-500/30 rounded-lg p-3 mb-6">
                <p class="text-xs text-blue-300 text-center">
                    <i data-lucide="info" class="w-3 h-3 inline"></i>
                    Enter the 6-digit code sent to <strong id="user-email">your email</strong>
                </p>
            </div>

            <!-- Form -->
            <form id="reset-form" class="space-y-5">
                <!-- Email (read-only) -->
                <div>
                    <label class="text-sm text-gray-400 mb-2 block">Email</label>
                    <input type="email" id="email" readonly
                        class="input-field w-full px-4 py-3 rounded-lg text-gray-400 cursor-not-allowed">
                </div>

                <!-- Code -->
                <div>
                    <label class="text-sm text-gray-400 mb-2 block">Verification Code</label>
                    <input type="text" id="code" required maxlength="6" pattern="\d{6}"
                        class="input-field code-input w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                        placeholder="000000">
                </div>

                <!-- New Password -->
                <div>
                    <label class="text-sm text-gray-400 mb-2 block">New Password</label>
                    <div class="relative">
                        <input type="password" id="new-password" required minlength="6"
                            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                            placeholder="Minimum 6 characters">
                        <button type="button" onclick="togglePassword('new-password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="pwd-strength mt-2" id="pwd-strength"></div>
                    <p class="text-xs text-gray-500 mt-1" id="pwd-hint"></p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="text-sm text-gray-400 mb-2 block">Confirm New Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" required
                            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                            placeholder="Re-enter password">
                        <button type="button" onclick="togglePassword('confirm-password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                    class="btn-primary w-full py-3 rounded-lg text-white font-bold flex items-center justify-center gap-2">
                    <i data-lucide="check" class="w-5 h-5"></i>
                    <span>Reset Password</span>
                </button>
            </form>

            <!-- Loading -->
            <div id="loading" class="hidden text-center py-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-violet-500 mx-auto"></div>
                <p class="text-gray-400 mt-3 text-sm">Resetting password...</p>
            </div>

        </div>

        <!-- Resend Code -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-500">
                Didn't receive code? <a href="forgot-password.html" class="text-violet-400 hover:text-white">Resend</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Pre-fill email from session
        const savedEmail = sessionStorage.getItem('resetEmail');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('user-email').textContent = savedEmail;
        } else {
            // Redirect to forgot password if no email
            window.location.href = 'forgot-password.html';
        }

        // Password strength indicator
        const pwdInput = document.getElementById('new-password');
        const pwdStrength = document.getElementById('pwd-strength');
        const pwdHint = document.getElementById('pwd-hint');

        pwdInput.addEventListener('input', () => {
            const pwd = pwdInput.value;
            let strength = 0;
            let hint = '';

            if (pwd.length >= 6) strength++;
            if (pwd.length >= 10) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[^A-Za-z0-9]/.test(pwd)) strength++;

            if (strength <= 1) {
                pwdStrength.className = 'pwd-strength bg-red-500';
                hint = 'Weak password';
            } else if (strength <= 3) {
                pwdStrength.className = 'pwd-strength bg-yellow-500';
                hint = 'Medium password';
            } else {
                pwdStrength.className = 'pwd-strength bg-green-500';
                hint = 'Strong password';
            }

            pwdHint.textContent = hint;
            pwdHint.className = 'text-xs mt-1 ' + (strength <= 1 ? 'text-red-400' : strength <= 3 ? 'text-yellow-400' : 'text-green-400');
        });

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
            lucide.createIcons();
        }

        // Form submission
        const resetForm = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const newPassword = pwdInput.value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validation
            if (code.length !== 6) {
                alert('Code must be 6 digits');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            // Show loading
            resetForm.classList.add('hidden');
            loading.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    // Success!
                    sessionStorage.removeItem('resetEmail');
                    alert('✅ ' + data.message);
                    window.location.href = 'login.html';
                } else {
                    // Error
                    loading.classList.add('hidden');
                    resetForm.classList.remove('hidden');
                    submitBtn.disabled = false;
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                loading.classList.add('hidden');
                resetForm.classList.remove('hidden');
                submitBtn.disabled = false;
                alert('❌ Failed to connect to server');
                console.error(error);
            }
        });
    </script>
</body>

</html>
